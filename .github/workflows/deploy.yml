name: Backend Deploy CI/CD

on:
  push:
    branches:
      - Sprint-Final

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # 1. ARREGLO: Versión de PHP corregida
          php-version: "8.2" 
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, pdo, zip

      - name: Install Dependencies
        # 2. ARREGLO: Cambiado a 'update' para evitar el fallo del composer.lock
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare Environment for Testing
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Sprint-Final'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/backend

            # Ponemos la app en mantenimiento
            php artisan down || true
            
            # Traemos el código nuevo
            git pull origin Sprint-Final
            
            # 2. ARREGLO: Cambiado a 'update' en producción también
            composer update --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # 3. ARREGLO: Migraciones y Seeders (AÑADIDOS)
            php artisan migrate --force
            php artisan db:seed --force
            
            # Limpiamos y recreamos las cachés
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Levantamos la app
            php artisan up