name: Backend Deploy CI/CD

on:
  push:
    branches:
      - Sprint-Final

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2" # Ajustado a 8.2 o 8.3 (Laravel 11+). PHP 8.5 aún no existe oficialmente en estable.
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, pdo, zip

      - name: Install Dependencies
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare Environment for Testing
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Sprint-Final'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/backend

            # 1. Ponemos la app en mantenimiento
            php artisan down || true
            
            # 2. Traemos el código nuevo
            git pull origin Sprint-Final
            
            # 3. Instalamos dependencias optimizadas
            composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
            
            # 4. Base de datos: Migraciones y Seeders (El --force es obligatorio en producción)
            php artisan migrate --force
            php artisan db:seed --force
            
            # 5. Limpiamos y recreamos las cachés para que vaya super rápido
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # 6. Levantamos la app
            php artisan up