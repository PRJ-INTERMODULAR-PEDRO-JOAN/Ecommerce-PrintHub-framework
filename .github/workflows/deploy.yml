name: Backend Deploy CI/CD

on:
  push:
    branches:
      - Sprint-Final

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          # 1. ARREGLO: Versión de PHP corregida
          php-version: "8.2" 
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, json, libxml, pdo, zip

      - name: Install Dependencies
        # 2. ARREGLO: Cambiado a 'update' para evitar el fallo del composer.lock
        run: composer update -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Prepare Environment for Testing
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/database.sqlite

      - name: Run Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test

  deploy:
    name: Deploy to Server
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/Sprint-Final'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /var/www/backend

            # Ponemos la app en mantenimiento
            php artisan down || true
            
            # --- ARREGLO 1: DESCARTAR CAMBIOS DEL 'SED' ANTERIOR ---
            # Esto limpia cualquier archivo modificado en el servidor para que git pull no falle
            git reset --hard HEAD
            
            # Traemos el código nuevo
            git pull origin Sprint-Final
            
            # --- CORRECCIÓN AUTOMÁTICA DE DOMINIOS ---
            echo "Reemplazando localhost por los dominios reales (HTTPS)..."
            
            # 1. Forzamos las variables correctas en el archivo .env del servidor
            sed -i 's|APP_URL=.*|APP_URL=https://api.projecte01.ddaw.es|g' .env
            sed -i 's|FRONTEND_URL=.*|FRONTEND_URL=https://www.projecte01.ddaw.es|g' .env
            sed -i 's|^SANCTUM_STATEFUL_DOMAINS=.*|SANCTUM_STATEFUL_DOMAINS=www.projecte01.ddaw.es,projecte01.ddaw.es|g' .env
            sed -i 's|^SESSION_DOMAIN=.*|SESSION_DOMAIN=.projecte01.ddaw.es|g' .env
            sed -i 's|^GOOGLE_REDIRECT_URI=.*|GOOGLE_REDIRECT_URI=https://api.projecte01.ddaw.es/api/oauth/google/callback|g' .env
            
            # 2. Buscar y reemplazar 'localhost:5174' por el dominio del Frontend en el código fuente
            find app/ config/ routes/ database/ resources/ -type f -name "*.php" -exec sed -i 's|http://localhost:5174|https://www.projecte01.ddaw.es|g' {} +
            find app/ config/ routes/ database/ resources/ -type f -name "*.php" -exec sed -i 's|localhost:5174|www.projecte01.ddaw.es|g' {} +
            
            # 3. Buscar y reemplazar 'http://localhost' por el dominio de la API en el código fuente
            find app/ config/ routes/ database/ resources/ -type f -name "*.php" -exec sed -i 's|http://localhost|https://api.projecte01.ddaw.es|g' {} +
            # ------------------------------------------------

            # --- ARREGLO 2: IGNORAR REQUISITOS DE PLATAFORMA ---
            composer update --no-interaction --prefer-dist --optimize-autoloader --no-dev --ignore-platform-reqs
            
            # Migraciones y Seeders
            php artisan migrate:fresh --seed --force
            
            # Limpiamos y recreamos las cachés (MUY IMPORTANTE tras cambiar el .env y el código)
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Levantamos la app
            php artisan up