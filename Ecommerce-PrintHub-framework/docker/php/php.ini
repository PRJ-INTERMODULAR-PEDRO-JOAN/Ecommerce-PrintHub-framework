; Production PHP configuration for PrintHub

[PHP]
expose_php = Off
max_execution_time = 60
max_input_time = 60
memory_limit = 256M
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr
post_max_size = 64M
upload_max_filesize = 64M
max_file_uploads = 20
date.timezone = UTC
