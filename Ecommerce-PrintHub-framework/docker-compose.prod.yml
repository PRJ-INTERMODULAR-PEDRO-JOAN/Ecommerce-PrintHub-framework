# ──────────────────────────────────────────────────────────────
# PrintHub – Production Docker Compose
# Usage:  docker compose -f docker-compose.prod.yml up -d
# ──────────────────────────────────────────────────────────────

services:

  # ── Application (PHP-FPM + Nginx built into the image) ───────
  app:
    image: "${APP_IMAGE:-printhub/app}:${APP_TAG:-latest}"
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: unless-stopped
    environment:
      APP_ENV: production
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE}"
      DB_USERNAME: "${DB_USERNAME}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PASSWORD: "${REDIS_PASSWORD:-null}"
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: "${MAIL_MAILER:-log}"
      MAIL_HOST: "${MAIL_HOST:-127.0.0.1}"
      MAIL_PORT: "${MAIL_PORT:-2525}"
      MAIL_USERNAME: "${MAIL_USERNAME:-null}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-null}"
      MAIL_FROM_ADDRESS: "${MAIL_FROM_ADDRESS}"
      MAIL_FROM_NAME: "${MAIL_FROM_NAME:-PrintHub}"
    volumes:
      - app_storage:/var/www/html/storage
    networks:
      - backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MySQL 8 ───────────────────────────────────────────────────
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD}"
      MYSQL_DATABASE: "${DB_DATABASE}"
      MYSQL_USER: "${DB_USERNAME}"
      MYSQL_PASSWORD: "${DB_PASSWORD}"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c 'if [ -n "$$REDIS_PASSWORD" ] && [ "$$REDIS_PASSWORD" != "null" ];
             then redis-server --requirepass "$$REDIS_PASSWORD";
             else redis-server; fi'
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Nginx reverse proxy + Let's Encrypt (Certbot) ─────────────
  nginx-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    networks:
      - frontend
      - backend
    depends_on:
      - app

  # ── Certbot (Let's Encrypt certificate renewal) ──────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Renew certificates every 12 h; Certbot only renews within 30 days of expiry
    entrypoint: >
      /bin/sh -c "trap exit TERM; while :;
        do certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!}; done"

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
    internal: true

volumes:
  app_storage:
  mysql_data:
  redis_data:
  certbot_www:
  certbot_certs:
